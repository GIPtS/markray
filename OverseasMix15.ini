 [custom]
;不要随意改变关键字，否则会导致出错
;acl4SSR规则

;去广告：支持
;自动测速：支持
;微软分流：支持
;苹果分流：支持
;增强中国IP段：支持
;增强国外GFW：支持

;设置规则标志位
ruleset=🎗️ Overseas,https://raw.githubusercontent.com/GIPtS/markray/main/tailormadeProxyTW.list
ruleset=📹 Emby_gf,https://raw.githubusercontent.com/GIPtS/markray/main/Emby_gf.list
ruleset=📹 Emby,https://raw.githubusercontent.com/GIPtS/markray/main/Emby_direct.list
ruleset=📹 Emby,https://raw.githubusercontent.com/GIPtS/markray/main/Emby.list
ruleset=🍎 Apple AI,https://raw.githubusercontent.com/GIPtS/markray/main/overseas.list
ruleset=🗽 AI,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.list
ruleset=🗽 AI,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Claude.list
ruleset=🛑 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
ruleset=🛑 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list
ruleset=🐟 漏网之鱼,[]FINAL
