custom_proxy_group=🇭🇰 SH HK`url-test`^(?=.*香港)(?!.*(-|极速|TEST|专线|IPLC|IEPL)).*$`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇹🇼 SH TW`url-test`^(?=.*台湾)(?!.*(-|极速|TEST|专线|IPLC|IEPL)).*$`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇸🇬 SH SG`url-test`^(?=.*新加坡)(?!.*(-|极速|TEST|专线|IPLC|IEPL)).*$`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇺🇲 SH US`url-test`^(?=.*美国)(?!.*(-|极速|TEST|专线|IPLC|IEPL)).*$`http://www.gstatic.com/generate_204`300,,150
