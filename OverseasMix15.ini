custom_proxy_group=自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=手动切换`select`[]🇹🇼 DM TW`[]🇹🇼 GF TW`[]🇹🇼 SH TW`[]🇭🇰 DM HK`[]🇭🇰 GF HK`[]🇭🇰 SH HK`[]🇸🇬 DM SG`[]🇸🇬 GF SG`[]🇸🇬 SH SG`[]🇺🇲 DM US`[]🇺🇲 GF US`[]🇺🇲 SH US`[]🇨🇳 回国节点`.*
