custom_proxy_group=🇺🇲 DM US`url-test`^(?=.*美国)(?=.*(极速|TEST|专线|IPLC|落地)).*$`http://www.gstatic.com/generate_204`300,,150
custom_proxy_group=🇭🇰 GF HK`url-test`(Hongkong)`http://www.gstatic.com/generate_204`300,,25
custom_proxy_group=🇹🇼 GF TW`url-test`(Taiwan)`http://www.gstatic.com/generate_204`300,,25
